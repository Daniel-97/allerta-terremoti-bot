name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          secrets: |
            BOT_TOKEN
            WEBHOOK_SECRET
            TURSO_DATABASE_URL
            TURSO_AUTH_TOKEN
            GEONAMES_USERNAME
            ADMIN_CHAT_IDS
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          GEONAMES_USERNAME: ${{ secrets.GEONAMES_USERNAME }}
          ADMIN_CHAT_IDS: ${{ secrets.ADMIN_CHAT_IDS }}

      - name: Set optional secrets (if present)
        run: |
          for name in HEALTHCHECKS_URL MAX_ATTEMPTS ITALY_ALERT_THRESHOLD WORLD_ALERT_THRESHOLD MAX_LOCATIONS_PER_USER LOOKBACK_WINDOW_MIN DELIVERIES_RETENTION_DAYS EVENTS_RETENTION_DAYS; do
            value="${!name}"
            if [ -n "$value" ]; then
              echo "$value" | npx wrangler secret put "$name"
            else
              echo "$name not set, skipping"
            fi
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          HEALTHCHECKS_URL: ${{ secrets.HEALTHCHECKS_URL }}
          MAX_ATTEMPTS: ${{ secrets.MAX_ATTEMPTS }}
          ITALY_ALERT_THRESHOLD: ${{ secrets.ITALY_ALERT_THRESHOLD }}
          WORLD_ALERT_THRESHOLD: ${{ secrets.WORLD_ALERT_THRESHOLD }}
          MAX_LOCATIONS_PER_USER: ${{ secrets.MAX_LOCATIONS_PER_USER }}
          LOOKBACK_WINDOW_MIN: ${{ secrets.LOOKBACK_WINDOW_MIN }}
          DELIVERIES_RETENTION_DAYS: ${{ secrets.DELIVERIES_RETENTION_DAYS }}
          EVENTS_RETENTION_DAYS: ${{ secrets.EVENTS_RETENTION_DAYS }}
